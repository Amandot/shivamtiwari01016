name: Generate Space Devourer

on:
  schedule:
    - cron: "0 0 * * *" # Runs automatically every night
  workflow_dispatch: # Allows manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: shivamtiwari01016
          base: "" # This ensures we ONLY generate the game centerpiece
          config_order: isocalendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # Shows 6 months of data
          # THIS IS THE SECRET SAUCE: These palettes create the space background
          # and the bright yellow smiley character effect seen in the image.
          config_timezone: Asia/Kolkata # Use your local time for streaks
          committer_gist: space_devourer_gist
